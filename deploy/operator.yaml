apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer-aurora-operator
  namespace: pgbouncer-aurora
  labels:
    app.kubernetes.io/name: pgbouncer-aurora-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer-aurora-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer-aurora-operator
    spec:
      serviceAccountName: pgbouncer-aurora-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: pgbouncer-aurora-operator:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --leader-elect
            - --aws-region=ap-northeast-2
            - --watch-namespace=$(WATCH_NAMESPACE)
            - --watch-names=$(WATCH_NAMES)
            - --status-refresh-min-interval=$(STATUS_REFRESH_MIN_INTERVAL)
            - --status-recent-window=$(STATUS_RECENT_WINDOW)
            - --rds-metadata-refresh-interval=$(RDS_METADATA_REFRESH_INTERVAL)
            - --aws-api-qps=$(AWS_API_QPS)
            - --aws-api-burst=$(AWS_API_BURST)
            - --workers-per-cr=$(WORKERS_PER_CR)
            - --max-concurrent-reconciles=$(MAX_CONCURRENT_RECONCILES)
            - --reconcile-min-interval=$(RECONCILE_MIN_INTERVAL)
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WATCH_NAMES
              value: "*"
            - name: STATUS_REFRESH_MIN_INTERVAL
              value: "5s"
            - name: STATUS_RECENT_WINDOW
              value: "1m"
            - name: RDS_METADATA_REFRESH_INTERVAL
              value: "1m"
            - name: AWS_API_QPS
              value: "1"
            - name: AWS_API_BURST
              value: "1"
            - name: WORKERS_PER_CR
              value: "4"
            - name: MAX_CONCURRENT_RECONCILES
              value: "64"
            - name: RECONCILE_MIN_INTERVAL
              value: "1s"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-aurora-operator
  namespace: pgbouncer-aurora
  labels:
    app.kubernetes.io/name: pgbouncer-aurora-operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pgbouncer-aurora-operator
  ports:
    - name: http
      port: 8080
      targetPort: metrics
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgbouncer-aurora-operator-status
  namespace: pgbouncer-aurora
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer-aurora-operator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
    - ports:
        - protocol: TCP
          port: 8081
