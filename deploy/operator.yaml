apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer-aurora-operator
  namespace: pgbouncer-aurora
  labels:
    app.kubernetes.io/name: pgbouncer-aurora-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer-aurora-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer-aurora-operator
    spec:
      serviceAccountName: pgbouncer-aurora-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: pgbouncer-aurora-operator:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --leader-elect
            - --aws-region=ap-northeast-2
            - --watch-namespace=$(WATCH_NAMESPACE)
            - --watch-name=$(WATCH_NAME)
            - --max-concurrent-reconciles=1
            - --resync-period=$(RESYNC_PERIOD)
            - --reconcile-min-interval=$(RECONCILE_MIN_INTERVAL)
            - --rds-metadata-cache-ttl=1m
            - --aws-api-qps=$(AWS_API_QPS)
            - --aws-api-burst=$(AWS_API_BURST)
            - --db-probe-qps=$(DB_PROBE_QPS)
            - --db-probe-burst=$(DB_PROBE_BURST)
            - --monitor-job-timeout=$(MONITOR_JOB_TIMEOUT)
            - --scheduler-tick=$(SCHEDULER_TICK)
            - --discovery-workers=$(DISCOVERY_WORKERS)
            - --monitor-workers=$(MONITOR_WORKERS)
            - --status-refresh-min-interval=$(STATUS_REFRESH_MIN_INTERVAL)
            - --status-recent-window=$(STATUS_RECENT_WINDOW)
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WATCH_NAME
              value: "*"
            - name: RESYNC_PERIOD
              value: "60s"
            - name: RECONCILE_MIN_INTERVAL
              value: "1s"
            - name: AWS_API_QPS
              value: "2"
            - name: AWS_API_BURST
              value: "5"
            - name: DB_PROBE_QPS
              value: "20"
            - name: DB_PROBE_BURST
              value: "40"
            - name: MONITOR_JOB_TIMEOUT
              value: "8s"
            - name: SCHEDULER_TICK
              value: "1s"
            - name: DISCOVERY_WORKERS
              value: "2"
            - name: MONITOR_WORKERS
              value: "4"
            - name: STATUS_REFRESH_MIN_INTERVAL
              value: "5s"
            - name: STATUS_RECENT_WINDOW
              value: "1m"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-aurora-operator
  namespace: pgbouncer-aurora
  labels:
    app.kubernetes.io/name: pgbouncer-aurora-operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pgbouncer-aurora-operator
  ports:
    - name: http
      port: 8080
      targetPort: metrics
